name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  web:
    name: generio-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: generio-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: generio-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  api:
    name: generio-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: generio-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
