services:
  postgres:
    image: postgres:16-alpine
    container_name: generio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: generio
      POSTGRES_USER: generio
      POSTGRES_PASSWORD: generio_dev_password
    ports:
      - "5433:5432"
    volumes:
      - generio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U generio -d generio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  generio_pg_data:
